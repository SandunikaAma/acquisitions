services:
  app:
    build:
      context: .
      target: dev
    container_name: acquisitions-app-dev
    env_file:
      - .env.development
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - neon-local
    command: npm run dev

  neon-local:
    image: neondatabase/neon_local:latest
    container_name: acquisitions-neon-local
    env_file:
      - .env.development
    ports:
      - "5432:5432"
